<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nueva contraseña — MAISON</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="gate">
  <div class="gate-box">
    <span class="gate-logo">MAISON</span>
    <p class="gate-sub">Nueva contraseña</p>

   <form id="newPasswordForm" class="gate-form" style="display:none;">
      <label>Nueva contraseña
        <div class="password-wrap">
          <input type="password" id="newPassword" required minlength="6">
          <button type="button" class="toggle-password" data-target="newPassword" aria-label="Mostrar contraseña">👁️</button>
        </div>
      </label>
      <label>Confirmar contraseña
        <div class="password-wrap">
          <input type="password" id="confirmPassword" required minlength="6">
          <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Mostrar contraseña">👁️</button>
        </div>
      </label>
      <p class="gate-error" id="msgError"></p>
      <p class="reset-success" id="msgSuccess"></p>
      <button type="submit" class="btn btn-primary btn-full" id="updateBtn">
        Actualizar contraseña
      </button>
    </form>

    <p class="gate-text" id="loadingMsg">Verificando enlace...</p>
    
    <div id="invalidMsg" style="display:none;">
      <p class="gate-text">El enlace no es válido o ha expirado.</p>
      <a href="admin.html" class="btn btn-primary btn-full">Volver al login</a>
    </div>
  </div>
</div>

<script src="js/supabase-client.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".toggle-password").forEach((btn) => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      if (!input) return;
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      btn.textContent = isHidden ? "🙈" : "👁️";
    });
  });
});
</script>
<script>
async function verificarToken() {
  const hash = window.location.hash;
  console.log("Hash de URL:", hash);
  
  if (hash && hash.includes("access_token")) {
    console.log("Token detectado, esperando sesión...");
    await new Promise(r => setTimeout(r, 1500));
    
    const { data } = await supabaseClient.auth.getSession();
    console.log("Sesión:", data);
    
    if (data.session) {
      document.getElementById("loadingMsg").style.display = "none";
      document.getElementById("newPasswordForm").style.display = "flex";
      return;
    }
  }
  
  document.getElementById("loadingMsg").style.display = "none";
  document.getElementById("invalidMsg").style.display = "block";
}

supabaseClient.auth.onAuthStateChange((event, session) => {
  console.log("Auth event:", event);
  if (event === "PASSWORD_RECOVERY" || (event === "SIGNED_IN" && session)) {
    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("invalidMsg").style.display = "none";
    document.getElementById("newPasswordForm").style.display = "flex";
  }
});

setTimeout(verificarToken, 800);

document.getElementById("newPasswordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pass1 = document.getElementById("newPassword").value;
  const pass2 = document.getElementById("confirmPassword").value;
  const err = document.getElementById("msgError");
  const ok = document.getElementById("msgSuccess");
  const btn = document.getElementById("updateBtn");
  
  err.textContent = "";
  ok.textContent = "";
  
  if (pass1 !== pass2) {
    err.textContent = "Las contraseñas no coinciden.";
    return;
  }
  
  if (pass1.length < 6) {
    err.textContent = "La contraseña debe tener mínimo 6 caracteres.";
    return;
  }
  
  btn.disabled = true;
  btn.textContent = "Actualizando...";
  
  try {
    const { error } = await supabaseClient.auth.updateUser({ password: pass1 });
    if (error) throw error;
    
    ok.textContent = "✓ Contraseña actualizada. Redirigiendo...";
    setTimeout(async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "admin.html";
    }, 2000);
  } catch (er) {
    err.textContent = er.message;
    btn.disabled = false;
    btn.textContent = "Actualizar contraseña";
  }
});
</script>

</body>
</html>
