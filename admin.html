<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON - Panel de Vendedor</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ============================================
         PANTALLA DE LOGIN
    ============================================ -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-logo">
                <h1>MAISON</h1>
                <p>Panel de Administración</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <div id="loginError" class="login-error hidden"></div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
        </div>
    </div>

    <!-- ============================================
         PANEL PRINCIPAL (se muestra tras login)
    ============================================ -->
    <div id="adminPanel" class="admin-panel hidden">

        <!-- HEADER -->
        <header class="admin-header">
            <div class="header-left">
                <h1 class="admin-logo">MAISON</h1>
                <span class="admin-subtitle">Panel de Vendedor</span>
            </div>
            <div class="header-right">
                <span id="userEmail" class="user-email"></span>
                <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
            </div>
        </header>

        <!-- NAVEGACIÓN DE PESTAÑAS -->
        <nav class="admin-nav">
            <button class="nav-tab active" data-tab="productos">Productos</button>
            <button class="nav-tab" data-tab="pedidos">Pedidos</button>
        </nav>

        <!-- ============================================
             PESTAÑA: PRODUCTOS
        ============================================ -->
        <div id="tab-productos" class="tab-content active">

            <!-- Formulario agregar/editar producto -->
            <section class="section-card">
                <h2 class="section-title" id="formTitle">Agregar Nuevo Producto</h2>

                <form id="productForm" class="product-form">
                    <input type="hidden" id="productId">

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nombre del producto *</label>
                            <input type="text" id="productName" placeholder="Ej: Vestido Louis Luigi" required>
                        </div>
                        <div class="form-group">
                            <label>Precio (CLP) *</label>
                            <input type="number" id="productPrice" placeholder="89900" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Categoría *</label>
                            <select id="productCategory" required>
                                <option value="">Seleccionar categoría</option>
                                <option value="vestidos">Vestidos</option>
                                <option value="zapatos">Zapatos</option>
                                <option value="camisas">Camisas</option>
                                <option value="pantalones">Pantalones</option>
                                <option value="accesorios">Accesorios</option>
                                <option value="abrigos">Abrigos</option>
                                <option value="otros">Otros</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Stock disponible *</label>
                            <input type="number" id="productStock" placeholder="10" required min="0">
                        </div>
                        <div class="form-group full-width">
                            <label>Descripción</label>
                            <textarea id="productDescription" placeholder="Describe el producto..." rows="3"></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>URL de imagen</label>
                            <input type="url" id="productImage" placeholder="https://ejemplo.com/imagen.jpg">
                        </div>
                    </div>

                    <!-- Preview de imagen -->
                    <div id="imagePreview" class="image-preview hidden">
                        <img id="previewImg" src="" alt="Preview">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="btnSubmit">
                            Agregar Producto
                        </button>
                        <button type="button" class="btn-secondary hidden" id="btnCancel">
                            Cancelar
                        </button>
                    </div>
                </form>
            </section>

            <!-- Lista de productos -->
            <section class="section-card">
                <div class="section-header">
                    <h2 class="section-title">Mis Productos</h2>
                    <div class="search-box">
                        <input type="text" id="searchProducts" placeholder="Buscar producto...">
                    </div>
                </div>

                <div id="productsMessage" class="info-message hidden"></div>
                <div id="productsList" class="products-grid">
                    <div class="loading-spinner">Cargando productos...</div>
                </div>
            </section>
        </div>

        <!-- ============================================
             PESTAÑA: PEDIDOS
        ============================================ -->
        <div id="tab-pedidos" class="tab-content hidden">
            <section class="section-card">
                <div class="section-header">
                    <h2 class="section-title">Gestión de Pedidos</h2>
                    <div class="pedidos-filters">
                        <select id="filterEstado">
                            <option value="">Todos los estados</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="confirmado">Confirmado</option>
                            <option value="enviado">Enviado</option>
                            <option value="entregado">Entregado</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                        <input type="date" id="filterFecha" title="Filtrar por fecha">
                    </div>
                </div>

                <div id="pedidosList" class="pedidos-list">
                    <div class="loading-spinner">Cargando pedidos...</div>
                </div>
            </section>
        </div>

    </div><!-- fin adminPanel -->

    <!-- Modal de confirmación -->
    <div id="confirmModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modalTitle">¿Confirmar acción?</h3>
            <p id="modalMessage">Esta acción no se puede deshacer.</p>
            <div class="modal-actions">
                <button id="modalConfirm" class="btn-danger">Confirmar</button>
                <button id="modalCancel" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Toast de notificaciones -->
    <div id="toast" class="toast hidden"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
